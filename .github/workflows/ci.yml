name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  agentwharf:
    name: agentwharf
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.24.x"
          cache: true

      - name: Boundary check
        run: ./scripts/check-boundary.sh

      - name: Test
        run: go test -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2
          args: ./...
